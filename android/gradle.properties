# 强制 Gradle 走你的 v2rayN 代理通道（HTTP 协议）
systemProp.http.proxyHost=gz.whzxc.com
systemProp.http.proxyPort=18080
systemProp.https.proxyHost=gz.whzxc.com
systemProp.https.proxyPort=18080

# 稳妥起见，把 SOCKS 协议代理也加上
#systemProp.socks.proxyHost=127.0.0.1
#systemProp.socks.proxyPort=10808

# 开启按需配置和并行编译，顺便给首次编译提速
org.gradle.configureondemand=true
org.gradle.parallel=true
org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process